# Activates Red Hat build of Kueue; Tekton PipelineRun integration matches hack/kueue-config.yaml.
apiVersion: kueue.openshift.io/v1
kind: Kueue
metadata:
  name: cluster
  namespace: openshift-kueue-operator
spec:
  managementState: Managed
  config:
    integrations:
      frameworks:
        - BatchJob
      # RH Kueue CR: GVR objects (not OSS-style "group/resource.version" strings).
      externalFrameworks:
        - group: tekton.dev
          version: v1
          resource: pipelineruns
    preemption:
      preemptionPolicy: Classical
